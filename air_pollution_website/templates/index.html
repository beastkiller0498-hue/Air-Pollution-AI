<!DOCTYPE html>
<html>

<head>

<title>AI Air Pollution Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🌍 AI Air Pollution Monitoring System</h1>

<form method="POST">
<input type="text" name="city" placeholder="Enter city or village">
<button type="submit">Search</button>
</form>

{% if city %}

<div class="card">

<h2>{{city}}</h2>

<p>AQI: {{aqi}}</p>

<p>PM2.5: {{pm25}}</p>

<p>PM10: {{pm10}}</p>

<p>AI Future Prediction: {{future_ai}}</p>

<p>Recommendation: {{advice}}</p>

</div>

<div class="card">

<h2>AQI Forecast</h2>

<canvas id="aqiChart"></canvas>

<script>

var ctx=document.getElementById('aqiChart');

new Chart(ctx,{
type:'line',
data:{
labels:["1h","2h","3h","4h","5h","6h"],
datasets:[{
label:'AQI Forecast',
data:{{forecast}},
borderWidth:3
}]
}
});

</script>

</div>

<div class="card">

<h2>Pollution Map</h2>

<div id="map" style="height:400px"></div>

<script>

var map=L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

</script>

</div>

{% endif %}

</body>

</html>
